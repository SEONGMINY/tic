name: tic
options:
  bundleIdPrefix: com.tic
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"

schemes:
  tic:
    build:
      targets:
        tic: all
        ticWidgets: all
    run:
      config: Debug

targets:
  tic:
    type: application
    platform: iOS
    sources:
      - path: tic
    info:
      path: tic/Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSCalendarsUsageDescription: "tic에서 캘린더 일정을 확인하고 관리하기 위해 접근 권한이 필요합니다."
        NSRemindersUsageDescription: "tic에서 미리 알림을 확인하고 관리하기 위해 접근 권한이 필요합니다."
        NSSupportsLiveActivities: true
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.miny.tic
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE: false
    entitlements:
      path: tic/tic.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.miny.tic
    dependencies:
      - target: ticWidgets
        embed: true

  ticWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: ticWidgets
      - path: tic/Models/TicActivityAttributes.swift
      - path: tic/Models/WidgetData.swift
    info:
      path: ticWidgets/Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.miny.tic.widgets
    entitlements:
      path: ticWidgets/ticWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.miny.tic
